<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2333121D'/%3E%3Ccircle cx='50' cy='50' r='26' fill='%23D9A441'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
:root{
  --claret:#33121D; --claret-deep:#250D14; --cream:#F5EDDD; --cream-dim:#CDBFA4;
  --brass:#D9A441; --ink:#2A1219; --meta:#7A6656; --red:#B0463A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;font-family:'Work Sans',-apple-system,sans-serif;color:var(--cream);
  background:linear-gradient(180deg,#250D14 0%,var(--claret) 40%,#2C1019 100%);background-attachment:fixed;
  padding-bottom:70px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
a{color:inherit}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
.frame{max-width:460px;margin:0 auto;padding:28px 16px 0}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);font-weight:600;margin-bottom:6px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:34px;line-height:1.05;margin:0;color:var(--cream)}
.hmeta{margin-top:8px;font-size:13px;color:var(--cream-dim)}
.config{background:rgba(217,164,65,.15);border:1px solid var(--brass);border-radius:10px;padding:14px;margin:16px 0;font-size:12px}
.config label{display:block;margin-bottom:8px;color:var(--brass);font-weight:600}
.config input{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(245,237,221,.3);background:rgba(245,237,221,.06);color:var(--cream);font-size:14px;font-family:monospace}
.config .hint{margin-top:6px;color:var(--cream-dim);font-size:11px}
.actions{display:flex;gap:8px;margin:18px 0 14px;flex-wrap:wrap}
.btn{border-radius:10px;padding:12px 16px;font-size:15px;font-weight:500;border:1px solid rgba(245,237,221,.3);background:transparent;color:var(--cream)}
.btn.primary{background:var(--brass);color:var(--ink);border:none;font-weight:600}
.btn.active{border-color:var(--brass);color:var(--brass)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{position:relative;background:var(--cream);color:var(--ink);border-radius:4px;padding:18px 16px 14px;margin-bottom:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.35);border-top:5px solid var(--brass);animation:rise .35s ease both;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  transition:opacity .25s ease, transform .2s ease, box-shadow .2s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.card{animation:none}}
.card.dragging{opacity:.95;box-shadow:0 20px 46px rgba(0,0,0,.55);z-index:20;cursor:grabbing;animation:none;transition:none}
.card.removing{opacity:0;transform:translateX(48px) scale(.96);box-shadow:none;pointer-events:none}
.card .draghint{position:absolute;top:10px;left:12px;font-size:15px;color:#B7A98C;letter-spacing:1px;line-height:1;display:none}
.editing .draghint{display:block}
.remove{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;border:1px solid var(--red);
  background:transparent;color:var(--red);font-size:18px;line-height:26px;display:none}
.editing .remove{display:block}
.wtop{text-align:center;margin-bottom:12px;padding:0 20px}
.wname{font-family:'Fraunces',serif;font-weight:700;font-size:21px;margin:0 0 4px;line-height:1.15}
.wmeta{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--meta)}
.besttag{display:flex;justify-content:space-between;align-items:baseline;background:var(--ink);color:var(--cream);
  border-radius:6px;padding:9px 12px;margin-bottom:10px}
.bestlabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);font-weight:600}
.bestval{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:18px}
.bestval small{font-family:'Work Sans',sans-serif;font-size:12.5px;color:var(--cream-dim);font-weight:500}
.ledger{border-top:1px solid rgba(42,18,25,.15)}
.lrow{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-bottom:1px dotted rgba(42,18,25,.2);font-size:14.5px;gap:8px}
.lrow.best{background:rgba(217,164,65,.14);border-radius:4px;padding:9px 8px;margin:0 -6px}
.lrow.stale{opacity:.6}
.lrow.notfound{opacity:.45}
.lret{display:flex;align-items:center;gap:8px;font-weight:500;text-decoration:none;flex-shrink:0}
.lret .go{font-size:11px;color:#9A8574;margin-left:2px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.lright{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.price{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:15px}
.price.b{font-weight:600}
.age{font-size:10.5px;color:#9A8574}
.age.stale{color:var(--red)}
.cardfoot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;font-size:12px;color:var(--meta)}
.trolley{color:#8A4B2F;font-weight:600;font-size:13px}
.recheck{background:transparent;border:none;color:#8A4B2F;font-weight:600;font-size:13px;text-decoration:underline;padding:4px}
.empty{text-align:center;padding:48px 20px;color:var(--cream-dim)}
.empty .glyph{font-size:40px;color:var(--brass);margin-bottom:12px}
.empty h2{font-family:'Fraunces',serif;font-size:22px;color:var(--cream);margin:0 0 10px;font-weight:600}
.empty p{font-size:14.5px;line-height:1.6;margin:0 auto 22px;max-width:320px}
.addlabel{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);font-weight:600;margin-bottom:8px}
.search{width:100%;font-size:17px;padding:14px;border-radius:10px;border:1px solid rgba(245,237,221,.35);background:rgba(245,237,221,.06);color:var(--cream)}
.search::placeholder{color:rgba(245,237,221,.4)}
.hint{font-size:12.5px;color:var(--cream-dim);margin:8px 0 16px;line-height:1.5}
.match{display:block;width:100%;text-align:left;background:var(--cream);color:var(--ink);border:none;border-radius:6px;
  border-left:4px solid var(--brass);padding:12px 14px;margin-bottom:8px}
.match .mn{display:block;font-family:'Fraunces',serif;font-weight:600;font-size:16.5px;margin-bottom:2px}
.match .mm{display:block;font-size:12px;color:var(--meta)}
.manual{display:block;width:100%;background:transparent;border:1px dashed rgba(245,237,221,.4);color:var(--cream-dim);border-radius:8px;padding:12px 14px;font-size:14px;margin-top:4px}
.footnote{font-size:12px;color:var(--cream-dim);line-height:1.55;margin-top:4px;opacity:.8}
.hidden{display:none}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(245,237,221,.3);border-top-color:var(--brass);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(180,70,58,.2);border:1px solid var(--red);color:var(--red);border-radius:6px;padding:10px;margin:10px 0;font-size:13px}
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="eyebrow">UK supermarket tracker · v6.2 · self-hosted</div>
    <h1>Cellar Price Watch</h1>
    <div class="hmeta" id="hmeta"></div>
  </header>

  <div class="config" id="configBox" style="display:none">
    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="text" placeholder="https://your-backend.railway.app" value="">
    <div class="hint">The app already points at your server. Only change this if you move it.</div>
    <div id="configStatus" style="margin-top:8px;font-size:11px;color:var(--brass)"></div>
  </div>

  <div class="actions" id="listActions">
    <button class="btn primary" id="checkBtn" onclick="checkAllPrices()">Check prices</button>
    <button class="btn" onclick="showView('add')">+ Add wine</button>
    <button class="btn" id="editBtn" onclick="toggleEdit()">Edit</button>
    <button class="btn" onclick="document.getElementById('configBox').style.display = document.getElementById('configBox').style.display==='none' ? 'block' : 'none'" title="Backend settings" style="padding:12px 14px">⚙</button>
  </div>

  <div id="checkStatus" style="display:none;font-size:13px;color:var(--cream-dim);margin:10px 0;"></div>

  <main id="listView"></main>

  <main id="addView" class="hidden">
    <label class="addlabel" for="q">Search the wine list</label>
    <input class="search" id="q" placeholder="e.g. Oyster Bay Sauvignon Blanc" autocomplete="off">
    <div class="hint">Instant matches from 441 popular UK supermarket wines — or add anything by name.</div>
    <div id="matches"></div>
    <button class="btn" style="width:100%;margin-top:20px" onclick="showView('list')">Back to my wines</button>
  </main>
</div>

<script>
const STORAGE_KEY = "cellar:v62";
const RETAILER_META = {
  "Tesco":       { dot:"#00539F", url:q=>`https://www.tesco.com/groceries/en-GB/search?query=${encodeURIComponent(q)}` },
  "Sainsbury's": { dot:"#F06C00", url:q=>`https://www.sainsburys.co.uk/gol-ui/SearchResults/${encodeURIComponent(q)}` },
  "ASDA":        { dot:"#78BE20", url:q=>`https://groceries.asda.com/search/${encodeURIComponent(q)}` },
  "Waitrose":    { dot:"#1F4A38", url:q=>`https://www.waitrose.com/ecom/shop/search?&searchTerm=${encodeURIComponent(q)}` },
  "M&S":         { dot:"#111111", url:q=>`https://www.ocado.com/search?entry=${encodeURIComponent(q)}` },
  "Morrisons":   { dot:"#F9C606", url:q=>`https://groceries.morrisons.com/search?entry=${encodeURIComponent(q)}` },
  "Aldi":        { dot:"#0E5AA7", url:q=>`https://groceries.aldi.co.uk/en-GB/Search?keywords=${encodeURIComponent(q)}` },
  "Lidl":        { dot:"#0050AA", url:q=>`https://www.lidl.co.uk/search?q=${encodeURIComponent(q)}` },
  "Co-op":       { dot:"#00A2E0", url:q=>`https://www.coop.co.uk/products/search?q=${encodeURIComponent(q)}` },
  "Iceland":     { dot:"#E4022D", url:q=>`https://www.iceland.co.uk/search?q=${encodeURIComponent(q)}` },
  "Amazon":      { dot:"#FF9900", url:q=>`https://www.amazon.co.uk/s?k=${encodeURIComponent(q)}` },
};
// preferred display order; any unknown store falls through with a grey dot
const RETAILER_ORDER = ["Tesco","Sainsbury's","ASDA","Waitrose","M&S","Morrisons","Aldi","Lidl","Co-op","Iceland","Amazon"];
function retailerMeta(key){ return RETAILER_META[key] || { dot:"#8A7A66", url:q=>`https://www.trolley.co.uk/search/?q=${encodeURIComponent(q)}` }; }
const trolleyUrl = q => `https://www.trolley.co.uk/search/?q=${encodeURIComponent(q)}`;

const WINES = [
["Oyster Bay Sauvignon Blanc","Oyster Bay","Sauvignon Blanc","Marlborough","New Zealand","white"],
["Oyster Bay Chardonnay","Oyster Bay","Chardonnay","Marlborough","New Zealand","white"],
["Oyster Bay Pinot Noir","Oyster Bay","Pinot Noir","Marlborough","New Zealand","red"],
["Whispering Angel","Château d'Esclans","Grenache blend","Côtes de Provence","France","rosé"],
["Whispering Angel Limited Edition 2025","Château d'Esclans","Grenache blend","Côtes de Provence","France","rosé"],
["Pure Mirabeau","Mirabeau","Grenache blend","Côtes de Provence","France","rosé"],
["Roseblood Provence","Château La Mascaronne","Grenache blend","Côtes de Provence","France","rosé"],
["Cloudy Bay Sauvignon Blanc","Cloudy Bay","Sauvignon Blanc","Marlborough","New Zealand","white"],
["Villa Maria Private Bin Sauvignon Blanc","Villa Maria","Sauvignon Blanc","Marlborough","New Zealand","white"],
["19 Crimes Red Blend","19 Crimes","Shiraz blend","South Eastern Australia","Australia","red"],
["Campo Viejo Rioja Tempranillo","Campo Viejo","Tempranillo","Rioja","Spain","red"],
["Casillero del Diablo Cabernet Sauvignon","Concha y Toro","Cabernet Sauvignon","Central Valley","Chile","red"],
["Trivento Reserve Malbec","Trivento","Malbec","Mendoza","Argentina","red"],
["Yellow Tail Shiraz","Yellow Tail","Shiraz","South Eastern Australia","Australia","red"],
["Hardys VR Shiraz","Hardys","Shiraz","South Eastern Australia","Australia","red"],
["McGuigan Black Label Shiraz","McGuigan","Shiraz","South Eastern Australia","Australia","red"],
["Wolf Blass Yellow Label Shiraz","Wolf Blass","Shiraz","South Australia","Australia","red"],
["Barefoot Pinot Grigio","Barefoot","Pinot Grigio","California","USA","white"],
["Barefoot Merlot","Barefoot","Merlot","California","USA","red"],
["Blossom Hill White","Blossom Hill","White blend","California","USA","white"],
["I Heart Prosecco","I Heart","Glera","Veneto","Italy","sparkling"],
["Kylie Minogue Côtes de Provence Rosé","Kylie Minogue Wines","Grenache blend","Provence","France","rosé"],
["Mionetto Prosecco","Mionetto","Glera","Veneto","Italy","sparkling"],
["Moët & Chandon Brut Impérial","Moët & Chandon","Champagne blend","Champagne","France","sparkling"],
["Veuve Clicquot Yellow Label","Veuve Clicquot","Champagne blend","Champagne","France","sparkling"],
["La Vieille Ferme Rouge","Famille Perrin","Grenache blend","Ventoux","France","red"],
["Porta 6 Tinto","Vidigal Wines","Tinta Roriz blend","Lisboa","Portugal","red"],
["Trulli Primitivo","Trulli","Primitivo","Puglia","Italy","red"],
["Rustenberg Chardonnay","Rustenberg","Chardonnay","Stellenbosch","South Africa","white"],
["The Chocolate Block","Boekenhoutskloof","Syrah blend","Swartland","South Africa","red"],
["Gérard Bertrand Côte des Roses Rosé","Gérard Bertrand","Grenache blend","Languedoc","France","rosé"],
["Mirabeau en Provence Rosé","Mirabeau","Grenache blend","Provence","France","rosé"],
["Studio by Miraval Rosé","Miraval","Cinsault blend","Provence","France","rosé"],
["Santa Rita 120 Sauvignon Blanc","Santa Rita","Sauvignon Blanc","Central Valley","Chile","white"],
["Mateus Rosé","Sogrape","Baga blend","","Portugal","rosé"],
["Graham's Six Grapes Port","Graham's","Port blend","Douro","Portugal","fortified"],
["Taylor's LBV Port","Taylor's","Port blend","Douro","Portugal","fortified"],
["Croft Original Sherry","Croft","Palomino","Jerez","Spain","fortified"],
["Tio Pepe Fino Sherry","González Byass","Palomino","Jerez","Spain","fortified"],
];

let state = loadState();
let editMode = false;
const DEFAULT_BACKEND = "https://wine-backend-production-e7de.up.railway.app";
let backendUrl = localStorage.getItem("backendUrl") || DEFAULT_BACKEND;

function loadState(){
  try{ const v = localStorage.getItem(STORAGE_KEY); if(v) return JSON.parse(v); }catch(e){}
  return { wines: [] };
}

function saveState(s){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }catch(e){}
}

function persist(s){ state = s; saveState(s); }

const gbp = n => (typeof n === "number" && !isNaN(n)) ? "£" + n.toFixed(2) : "—";

// pull a usable price out of an offer string like "£17.50 Clubcard" or "2 for £36"
function offerPrice(p){
  if(!p || typeof p.offer !== "string" || !p.offer) return null;
  const o = p.offer;
  // multibuy: "2 for £36" -> per-unit
  let m = o.match(/(\d+)\s*for\s*£\s*([\d.]+)/i);
  if(m){ const n = parseInt(m[1],10), tot = parseFloat(m[2]); if(n>0 && tot>0) return +(tot/n).toFixed(2); }
  // member/single price: "£17.50 Clubcard"
  m = o.match(/£\s*([\d.]+)/);
  if(m){ const v = parseFloat(m[1]); if(v>0) return v; }
  return null;
}

// the cheapest achievable price at a retailer (shelf price or a lower offer price)
function effectivePrice(p){
  const base = (typeof p.price === "number" && !isNaN(p.price)) ? p.price : Infinity;
  const op = offerPrice(p);
  return (op != null && op < base) ? op : base;
}

function daysAgo(iso){ return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }

function ageLabel(iso){
  const d = daysAgo(iso);
  if(d < 1) return "today";
  if(d === 1) return "1 day ago";
  return d + " days ago";
}

function bestOf(w){
  const entries = (w.prices || []).filter(p => p.stocked && typeof p.price === "number");
  if(!entries.length) return null;
  let best = null, bestEff = Infinity;
  for(const p of entries){
    const eff = effectivePrice(p);
    if(eff < bestEff){ bestEff = eff; best = { ...p, effPrice: eff, discounted: eff < p.price }; }
  }
  return best;
}

function showView(v){
  document.getElementById("listView").classList.toggle("hidden", v !== "list");
  document.getElementById("listActions").classList.toggle("hidden", v !== "list");
  document.getElementById("addView").classList.toggle("hidden", v !== "add");
  if(v === "add"){ const q = document.getElementById("q"); q.value = ""; renderMatches(""); q.focus(); }
  if(v === "list") render();
}

function toggleEdit(){
  editMode = !editMode;
  document.getElementById("editBtn").textContent = editMode ? "Done" : "Edit";
  document.getElementById("editBtn").classList.toggle("active", editMode);
  render();
}

function renderMatches(q){
  const box = document.getElementById("matches");
  const t = q.trim().toLowerCase();
  let html = "";
  if(t.length >= 2){
    const terms = t.split(/\s+/);
    const hits = WINES.filter(w => {
      const hay = (w[0] + " " + w[1] + " " + w[2] + " " + w[3] + " " + w[4]).toLowerCase();
      return terms.every(x => hay.includes(x));
    }).slice(0, 8);
    html += hits.map((w,i) => {
      const wine = {name:w[0],producer:w[1],grape:w[2],region:w[3],country:w[4],style:w[5]};
      const encoded = btoa(JSON.stringify(wine));
      return `
      <button class="match" onclick="addWineFromEncoded('${encoded}')">
        <span class="mn">${w[0]}</span>
        <span class="mm">${[w[1],w[2],w[3],w[4]].filter(Boolean).join(" · ")} · ${w[5]}</span>
      </button>`;
    }).join("");
    html += `<button class="manual" onclick="addManual()">Add &ldquo;${q.trim()}&rdquo; exactly as typed</button>`;
  }
  box.innerHTML = html;
}

document.getElementById("q").addEventListener("input", e => renderMatches(e.target.value));

function addWineFromEncoded(encoded){
  try {
    const w = JSON.parse(atob(encoded));
    addWine(w);
  } catch(e) {
    console.error("Failed to decode wine:", e);
  }
}

function addWine(w){
  state.wines.push({ id: Date.now() + "-" + Math.random().toString(36).slice(2,7), ...w, prices: null, checkedAt: null });
  persist(state);
  showView("list");
}

function addManual(){
  const q = document.getElementById("q").value.trim();
  if(q.length < 2) return;
  addWine({ name: q, producer:"", grape:"", region:"", country:"", style:"" });
}

function removeWine(id){
  const card = document.querySelector(`#listView .card[data-id="${id}"]`);
  const commit = () => { persist({ wines: state.wines.filter(w => w.id !== id) }); render(); };
  if(card){
    card.classList.add("removing");
    setTimeout(commit, 260);
  } else {
    commit();
  }
}

// Long-press drag-to-reorder.
// Bound once via delegation; suppresses page scroll only after the hold fires.
function attachReorder(){
  const container = document.getElementById("listView");
  if(!container || container.dataset.reorderBound) return;
  container.dataset.reorderBound = "1";

  let card = null, holdTimer = null, dragging = false, startY = 0;

  const endDrag = () => {
    if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    if(dragging && card){
      card.classList.remove("dragging");
      card.style.transform = "";
      document.body.style.overflow = "";
      // rebuild order from the DOM
      const ids = [...container.querySelectorAll(".card")].map(c => c.dataset.id);
      const reordered = ids.map(id => state.wines.find(w => w.id === id)).filter(Boolean);
      state.wines.forEach(w => { if(!reordered.includes(w)) reordered.push(w); });
      persist({ ...state, wines: reordered });
    }
    dragging = false;
    card = null;
  };

  const onDown = (clientY, target) => {
    if(target.closest(".remove, a, button, input")) return;
    const c = target.closest(".card");
    if(!c || !container.contains(c)) return;
    card = c;
    startY = clientY;
    holdTimer = setTimeout(() => {
      holdTimer = null;
      if(!card) return;
      dragging = true;
      card.classList.add("dragging");
      document.body.style.overflow = "hidden"; // stop the page moving under us
      if(navigator.vibrate) navigator.vibrate(15);
    }, 300);
  };

  const onMove = (clientY, e) => {
    if(!dragging){
      // finger moved before the hold fired -> it's a scroll, let it go
      if(holdTimer && Math.abs(clientY - startY) > 10){
        clearTimeout(holdTimer); holdTimer = null; card = null;
      }
      return;
    }
    if(e && e.cancelable) e.preventDefault(); // this is what keeps the drag alive
    card.style.transform = `translateY(${clientY - startY}px) scale(1.02)`;

    // swap with whichever card our midpoint is now over
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    for(const other of container.querySelectorAll(".card")){
      if(other === card) continue;
      const r = other.getBoundingClientRect();
      if(mid > r.top && mid < r.bottom){
        const oMid = r.top + r.height / 2;
        if(mid < oMid) container.insertBefore(card, other);
        else container.insertBefore(card, other.nextSibling);
        // card has jumped to its new slot: re-baseline so it stays under the finger
        startY = clientY;
        card.style.transform = "translateY(0px) scale(1.02)";
        break;
      }
    }
  };

  // touch
  container.addEventListener("touchstart", e => {
    if(e.touches.length !== 1) return;
    onDown(e.touches[0].clientY, e.target);
  }, { passive: true });
  container.addEventListener("touchmove", e => {
    onMove(e.touches[0].clientY, e);
  }, { passive: false });
  container.addEventListener("touchend", endDrag);
  container.addEventListener("touchcancel", endDrag);

  // mouse (desktop)
  container.addEventListener("mousedown", e => onDown(e.clientY, e.target));
  document.addEventListener("mousemove", e => onMove(e.clientY, e));
  document.addEventListener("mouseup", endDrag);
}

async function checkAllPrices(){
  const url = (localStorage.getItem("backendUrl") || DEFAULT_BACKEND).trim();
  if(!url){ alert("No backend URL configured"); return; }
  const btn = document.getElementById("checkBtn");
  const status = document.getElementById("checkStatus");
  btn.disabled = true;
  status.style.display = "block";
  status.textContent = "Fetching prices...";
  status.innerHTML = '<span class="spinner" style="margin-right:6px"></span>Fetching prices from Trolley...';

  try {
    const wines = state.wines.map(w => ({name: w.name, id: w.id}));
    const res = await fetch(url.trim() + "/prices", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wines }),
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Map results back — keep whatever stores the backend returned
    persist({
      wines: state.wines.map(w => {
        const result = data.results[w.name];
        if(!result) return { ...w, prices: [], checkedAt: new Date().toISOString() };
        const keys = Object.keys(result);
        // order known retailers first, then any extras alphabetically
        keys.sort((a,b) => {
          const ia = RETAILER_ORDER.indexOf(a), ib = RETAILER_ORDER.indexOf(b);
          if(ia === -1 && ib === -1) return a.localeCompare(b);
          if(ia === -1) return 1;
          if(ib === -1) return -1;
          return ia - ib;
        });
        const prices = keys.map(k => ({ retailer: k, ...result[k] }));
        return { ...w, prices, checkedAt: new Date().toISOString() };
      }),
    });

    status.textContent = `✓ Checked ${data.fetched} wines (${data.cached} from cache)`;
    setTimeout(() => { status.style.display = "none"; }, 3000);
    render();
  } catch(e){
    status.textContent = "Error: " + e.message;
    status.classList.add("error");
  } finally {
    btn.disabled = false;
  }
}

function render(){
  const main = document.getElementById("listView");
  const hm = document.getElementById("hmeta");
  const offers = state.wines.filter(w => (w.prices||[]).some(p => p.stocked && p.onOffer)).length;
  hm.innerHTML = state.wines.length
    ? `${state.wines.length} wine${state.wines.length>1?"s":""}${offers ? ` · <span style="color:var(--brass)">${offers} on offer</span>` : ""}`
    : "";

  if(!state.wines.length){
    main.innerHTML = `
      <div class="empty">
        <div class="glyph">◍</div>
        <h2>Your cellar list is empty</h2>
        <p>Add the wines you love. Tap "Check prices" and prices fetch from Trolley.co.uk — no tokens, no API limits.</p>
        <button class="btn primary" onclick="showView('add')">Add your first wine</button>
      </div>`;
    return;
  }

  main.innerHTML = state.wines.map(w => {
    const best = bestOf(w);
    const list = (w.prices || []).filter(p => p.stocked && typeof p.price === "number");
    let rows;
    if(!w.checkedAt){
      rows = `<div class="lrow notfound"><span class="lright" style="width:100%;text-align:center">Not checked yet</span></div>`;
    } else if(!list.length){
      rows = `<div class="lrow notfound"><span class="lright" style="width:100%;text-align:center">No supermarket price found</span></div>`;
    } else {
      rows = list.map(p => {
        const meta = retailerMeta(p.retailer);
        const isBest = best && best.retailer === p.retailer;
        const stale = w.checkedAt && daysAgo(w.checkedAt) > 7;
        return `<div class="lrow${isBest ? " best" : ""}${stale ? " stale" : ""}">
          <a class="lret" href="${meta.url(w.name)}" target="_blank"><span class="dot" style="background:${meta.dot}"></span>${p.retailer}<span class="go">↗</span></a>
          <span class="lright">
            ${p.offer ? `<span class="age" style="color:#B0463A;font-weight:600">${p.offer}</span>` : ""}
            <span class="age${stale ? " stale" : ""}">${ageLabel(w.checkedAt)}</span>
            <span class="price${isBest ? " b" : ""}">${gbp(p.price)}</span>
          </span>
        </div>`;
      }).join("");
    }

    return `<article class="card${editMode ? " editing" : ""}" data-id="${w.id}">
      <span class="draghint">⠿</span>
      <button class="remove" onclick="removeWine('${w.id}')">×</button>
      <div class="wtop">
        <h2 class="wname">${w.name}</h2>
        <div class="wmeta">${[w.producer,w.grape,w.region,w.country].filter(Boolean).join(" · ") || "Added manually"}</div>
      </div>
      ${best ? `<div class="besttag"><span class="bestlabel">Best price</span><span class="bestval">${gbp(best.effPrice)} <small>at ${best.retailer}${best.discounted ? " · with offer" : ""}</small></span></div>` : ""}
      <div class="ledger">${rows}</div>
      <div class="cardfoot">
        <span>Last checked: ${w.checkedAt ? ageLabel(w.checkedAt) : "never"}</span>
        <span style="display:flex;gap:14px">
          <a class="trolley" href="https://www.majestic.co.uk/search?q=${encodeURIComponent(w.name)}" target="_blank">Majestic ↗</a>
          <a class="trolley" href="${trolleyUrl(w.name)}" target="_blank">Trolley ↗</a>
        </span>
      </div>
    </article>`;
  }).join("") + `<p class="footnote">Live prices via Trolley.co.uk — shows the supermarkets Trolley lists for each wine (often the cheapest available). Tap a store to open its live search. Greyed after 7 days.${state.wines.length > 1 ? " Tap and hold a card to drag it into a new order." : ""}</p>`;

  attachReorder();
}

// Backend config UI (prefilled with the built-in default; editable via ⚙)
document.getElementById("backendUrl").value = backendUrl;
document.getElementById("backendUrl").addEventListener("change", e => {
  backendUrl = e.target.value.trim();
  const statusEl = document.getElementById("configStatus");
  if(backendUrl){
    localStorage.setItem("backendUrl", backendUrl);
    statusEl.textContent = "✓ Saved";
  } else {
    // cleared -> fall back to the built-in default
    localStorage.removeItem("backendUrl");
    backendUrl = DEFAULT_BACKEND;
    document.getElementById("backendUrl").value = DEFAULT_BACKEND;
    statusEl.textContent = "Reset to default";
  }
});

render();
</script>
